name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string
      notes:
        description: 'Release notes'
        required: false
        type: string
        default: ''
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

env:
  PROJECT_NAME: nadeo-freeporter

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Build
        run: nim c -d:release --opt:speed -o:"$PROJECT_NAME" src/nadeo_freeporter.nim

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp "$PROJECT_NAME" dist/
          [ -f README.md ] && cp README.md dist/ || true
          [ -f LICENSE ] && cp LICENSE dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: linux-zip
          path: dist

  build-windows:
    # Native Windows runner — Nim + its bundled MinGW produce the .exe. The CLI
    # has no GUI/OS deps, so a Windows build is a free bonus alongside Linux.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: 'stable'

      - name: Build
        run: nim c -d:release --opt:speed -o:"$env:PROJECT_NAME.exe" src/nadeo_freeporter.nim

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp "${PROJECT_NAME}.exe" dist/
          [ -f README.md ] && cp README.md dist/ || true
          [ -f LICENSE ] && cp LICENSE dist/ || true

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-zip
          path: linux-zip

      - uses: actions/download-artifact@v4
        with:
          name: windows-zip
          path: windows-zip

      - name: Package
        run: |
          (cd linux-zip && zip -r "../${PROJECT_NAME}-linux.zip" .)
          (cd windows-zip && zip -r "../${PROJECT_NAME}-windows.zip" .)

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "${{ inputs.version }}" \
              "${PROJECT_NAME}-linux.zip" \
              "${PROJECT_NAME}-windows.zip" \
              --title "${{ inputs.version }}" \
              --notes "${{ inputs.notes }}" \
              $PRERELEASE_FLAG
